<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #222; }
  .stage { display: flex; flex-direction: column; gap: 40px; align-items: center; padding: 40px; }
  /* App icon source: FULL square (platform masks the corners itself) */
  #icon { width: 1024px; height: 1024px; }
  /* Splash: large square, emblem centered with wordmark */
  #splash { width: 1536px; height: 1536px; }
  svg { display: block; width: 100%; height: 100%; }
  .wm { font-family: 'Baloo 2', system-ui, sans-serif; }
</style>

<!-- reusable emblem: cosmic bg + golden clock ring + campfire flame core -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#42307e"/>
      <stop offset="0.45" stop-color="#241a54"/>
      <stop offset="1" stop-color="#0a0818"/>
    </radialGradient>
    <radialGradient id="warm" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0" stop-color="#ffb24a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff7a1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe89a"/>
      <stop offset="0.5" stop-color="#f5c24a"/>
      <stop offset="1" stop-color="#c98a1e"/>
    </linearGradient>
    <linearGradient id="flameOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffcf5a"/>
      <stop offset="0.5" stop-color="#ff8a2c"/>
      <stop offset="1" stop-color="#e34a10"/>
    </linearGradient>
    <linearGradient id="flameMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff2b0"/>
      <stop offset="1" stop-color="#ffb02c"/>
    </linearGradient>
  </defs>
</svg>

<div class="stage">
  <!-- ICON 1024 -->
  <div id="icon">
    <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <rect width="1024" height="1024" fill="url(#bg)"/>
      <!-- faint stars -->
      <g fill="#fff">
        <circle cx="150" cy="180" r="4" opacity="0.7"/><circle cx="880" cy="220" r="5" opacity="0.8"/>
        <circle cx="820" cy="820" r="4" opacity="0.6"/><circle cx="180" cy="840" r="5" opacity="0.7"/>
        <circle cx="500" cy="120" r="3" opacity="0.6"/><circle cx="930" cy="540" r="3" opacity="0.5"/>
        <circle cx="90" cy="520" r="3" opacity="0.5"/>
      </g>
      <!-- orbit rings -->
      <g fill="none" stroke-linecap="round">
        <ellipse cx="512" cy="512" rx="430" ry="150" stroke="#8f7fff" stroke-width="6" opacity="0.28" transform="rotate(-24 512 512)"/>
        <ellipse cx="512" cy="512" rx="430" ry="150" stroke="#ffcf6a" stroke-width="4" opacity="0.22" transform="rotate(28 512 512)"/>
      </g>
      <!-- warm glow behind flame -->
      <ellipse cx="512" cy="560" rx="330" ry="340" fill="url(#warm)"/>
      <!-- golden clock ring -->
      <circle cx="512" cy="512" r="340" fill="none" stroke="url(#ring)" stroke-width="42"/>
      <circle cx="512" cy="512" r="340" fill="none" stroke="#7c5a12" stroke-width="42" opacity="0.25" stroke-dasharray="2 34" stroke-dashoffset="0"/>
      <!-- 4 cardinal tick blocks -->
      <g fill="url(#ring)">
        <rect x="496" y="120" width="32" height="70" rx="10"/>
        <rect x="496" y="834" width="32" height="70" rx="10"/>
        <rect x="120" y="496" width="70" height="32" rx="10"/>
        <rect x="834" y="496" width="70" height="32" rx="10"/>
      </g>
      <!-- campfire flame core -->
      <g>
        <path d="M512 250 C608 400 720 520 690 680 C665 810 575 862 512 840 C449 862 359 810 334 680 C304 520 416 400 512 250 Z" fill="url(#flameOut)" stroke="#b83a0c" stroke-width="10" stroke-linejoin="round"/>
        <path d="M512 400 C575 500 640 570 620 668 C602 752 560 786 512 768 C464 786 422 752 404 668 C384 570 449 500 512 400 Z" fill="url(#flameMid)"/>
        <path d="M512 512 C552 580 588 616 578 676 A66 66 0 0 1 446 676 C436 616 472 580 512 512 Z" fill="#fff6d4"/>
      </g>
      <!-- embers -->
      <g fill="#ffd36a"><circle cx="360" cy="360" r="10"/><circle cx="680" cy="330" r="8" fill="#ff9838"/><circle cx="640" cy="250" r="7" opacity="0.85"/></g>
    </svg>
  </div>

  <!-- SPLASH 1536 (emblem centered + wordmark) -->
  <div id="splash">
    <svg viewBox="0 0 1536 1536" xmlns="http://www.w3.org/2000/svg">
      <rect width="1536" height="1536" fill="url(#bg)"/>
      <g fill="#fff" opacity="0.7">
        <circle cx="240" cy="300" r="4"/><circle cx="1300" cy="360" r="5"/><circle cx="1250" cy="1200" r="4"/>
        <circle cx="280" cy="1240" r="5"/><circle cx="760" cy="220" r="3"/><circle cx="1360" cy="800" r="3"/>
      </g>
      <!-- emblem scaled/centered at 0.62, shifted up to leave room for wordmark -->
      <g transform="translate(768 660) scale(0.62) translate(-512 -512)">
        <g fill="none" stroke-linecap="round">
          <ellipse cx="512" cy="512" rx="430" ry="150" stroke="#8f7fff" stroke-width="8" opacity="0.28" transform="rotate(-24 512 512)"/>
          <ellipse cx="512" cy="512" rx="430" ry="150" stroke="#ffcf6a" stroke-width="6" opacity="0.22" transform="rotate(28 512 512)"/>
        </g>
        <ellipse cx="512" cy="560" rx="330" ry="340" fill="url(#warm)"/>
        <circle cx="512" cy="512" r="340" fill="none" stroke="url(#ring)" stroke-width="42"/>
        <g fill="url(#ring)">
          <rect x="496" y="120" width="32" height="70" rx="10"/><rect x="496" y="834" width="32" height="70" rx="10"/>
          <rect x="120" y="496" width="70" height="32" rx="10"/><rect x="834" y="496" width="70" height="32" rx="10"/>
        </g>
        <path d="M512 250 C608 400 720 520 690 680 C665 810 575 862 512 840 C449 862 359 810 334 680 C304 520 416 400 512 250 Z" fill="url(#flameOut)" stroke="#b83a0c" stroke-width="10" stroke-linejoin="round"/>
        <path d="M512 400 C575 500 640 570 620 668 C602 752 560 786 512 768 C464 786 422 752 404 668 C384 570 449 500 512 400 Z" fill="url(#flameMid)"/>
        <path d="M512 512 C552 580 588 616 578 676 A66 66 0 0 1 446 676 C436 616 472 580 512 512 Z" fill="#fff6d4"/>
      </g>
      <!-- wordmark -->
      <text class="wm" x="768" y="1160" text-anchor="middle" font-size="132" font-weight="800" fill="#ffe89a">CHRONO</text>
      <text class="wm" x="768" y="1300" text-anchor="middle" font-size="132" font-weight="800" fill="#f5c24a">EMPIRE</text>
    </svg>
  </div>
</div>
