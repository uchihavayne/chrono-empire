# Codemagic build config — builds the Capacitor iOS app on a cloud Mac and submits it to
# App Store Connect / TestFlight. This is the Windows-friendly equivalent of the EAS flow you
# used for the (Expo) Harfika game — Chrono Empire is Capacitor, so it uses Codemagic instead.
#
# ONE-TIME SETUP in the Codemagic web UI (codemagic.io) before the first build:
#  1. Connect this project's GitHub/GitLab repo.
#  2. Teams → Integrations → App Store Connect → add an API key (Apple Developer → Users and
#     Access → Integrations → App Store Connect API → generate a key). Name the integration
#     exactly:  Chrono Empire ASC   (or change APP_STORE_CONNECT_ISSUER below).
#  3. Code signing → iOS → let Codemagic manage signing automatically (it creates the
#     certificate + provisioning profile from your Apple account).
#  4. Make sure an app record exists in App Store Connect with bundle id com.chronoempire.game.

workflows:
  ios-release:
    name: Chrono Empire iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Chrono Empire ASC   # must match the integration name you created
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      # NO ios_signing / use-profiles — both kept failing for this generated-in-CI Capacitor
      # project ("No matching profiles" / "App requires a provisioning profile"). Instead Xcode
      # manages signing itself with the App Store Connect API key (-allowProvisioningUpdates):
      # it creates/downloads the cert + profile automatically at archive time.
      vars:
        BUNDLE_ID: "com.chronoempire.game"
        TEAM_ID: "63VUWUSJ8H"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Build the web app
        script: npm run build
      - name: Sync the iOS platform
        script: |
          # ios/ is committed with a pre-configured Info.plist (GADApplicationIdentifier etc.).
          # DON'T run `cap add ios` — it would regenerate/overwrite the project. Only sync copies
          # the fresh web build + installs pods, leaving our Info.plist untouched.
          npx cap sync ios
      - name: Generate app icon & splash
        script: npx @capacitor/assets generate --ios || true
      - name: Set up App Store (distribution) code signing
        script: |
          # Fail loudly (set -e) so a broken signing step can't go green and blow up later in the
          # archive. Use Codemagic's signing CLI to get an APP-STORE (distribution) cert + profile.
          set -e
          keychain initialize
          # Make a FRESH distribution certificate whose private key lives on THIS build machine.
          # Earlier builds left a cert whose key wasn't in the keychain, so fetch-signing-files
          # couldn't bind a profile to a usable cert (which is why the profile never got assigned).
          # '|| true' in case the account is already at its distribution-cert limit / one exists.
          app-store-connect certificates create --type IOS_DISTRIBUTION --save || true
          keychain add-certificates
          # Create/fetch the App Store provisioning profile for our bundle id, bound to that cert.
          # --verbose-logging prints exactly which cert + profile it picks, so any mismatch is visible.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose-logging
          keychain add-certificates
      - name: Archive & export the .ipa
        script: |
          set -e
          # `xcode-project use-profiles` kept setting Manual signing WITHOUT actually assigning a
          # profile to the App target ("App requires a provisioning profile"). So don't rely on its
          # silent auto-matching — read the profile fetch-signing-files just installed and pass its
          # name to xcodebuild EXPLICITLY.
          PROFILE_NAME=""
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            [ -e "$p" ] || continue
            security cms -D -i "$p" > /tmp/prof.plist 2>/dev/null || continue
            APPID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/prof.plist 2>/dev/null || echo "")
            case "$APPID" in
              *".$BUNDLE_ID")
                PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/prof.plist)
                echo "Matched profile for $BUNDLE_ID -> '$PROFILE_NAME'  ($p)"
                break;;
            esac
          done
          # Fail loudly here (not deep in the archive) if no profile was installed for our bundle id.
          test -n "$PROFILE_NAME"
          ARCHIVE="$CM_BUILD_DIR/build/App.xcarchive"
          xcodebuild -workspace "$XCODE_WORKSPACE" -scheme "$XCODE_SCHEME" \
            -configuration Release -archivePath "$ARCHIVE" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '<key>method</key><string>app-store</string>' \
            "<key>teamID</key><string>$TEAM_ID</string>" \
            '<key>signingStyle</key><string>manual</string>' \
            '<key>provisioningProfiles</key><dict>' \
            "<key>$BUNDLE_ID</key><string>$PROFILE_NAME</string>" \
            '</dict></dict></plist>' > /tmp/export.plist
          xcodebuild -exportArchive -archivePath "$ARCHIVE" \
            -exportPath "$CM_BUILD_DIR/build/ipa" \
            -exportOptionsPlist /tmp/export.plist
          ls -la "$CM_BUILD_DIR/build/ipa"
    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true      # goes to TestFlight first (safe)
        # submit_to_app_store: false    # flip to true when you're ready for the public release
