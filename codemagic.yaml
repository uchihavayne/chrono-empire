# Codemagic build config — builds the Capacitor iOS app on a cloud Mac and submits it to
# App Store Connect / TestFlight. This is the Windows-friendly equivalent of the EAS flow you
# used for the (Expo) Harfika game — Chrono Empire is Capacitor, so it uses Codemagic instead.
#
# ONE-TIME SETUP in the Codemagic web UI (codemagic.io) before the first build:
#  1. Connect this project's GitHub/GitLab repo.
#  2. Teams → Integrations → App Store Connect → add an API key (Apple Developer → Users and
#     Access → Integrations → App Store Connect API → generate a key). Name the integration
#     exactly:  Chrono Empire ASC   (or change APP_STORE_CONNECT_ISSUER below).
#  3. Code signing → iOS → let Codemagic manage signing automatically (it creates the
#     certificate + provisioning profile from your Apple account).
#  4. Make sure an app record exists in App Store Connect with bundle id com.chronoempire.game.

workflows:
  ios-release:
    name: Chrono Empire iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Chrono Empire ASC   # must match the integration name you created
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      # NO ios_signing / use-profiles — both kept failing for this generated-in-CI Capacitor
      # project ("No matching profiles" / "App requires a provisioning profile"). Instead Xcode
      # manages signing itself with the App Store Connect API key (-allowProvisioningUpdates):
      # it creates/downloads the cert + profile automatically at archive time.
      vars:
        BUNDLE_ID: "com.chronoempire.game"
        TEAM_ID: "63VUWUSJ8H"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Build the web app
        script: npm run build
      - name: Sync the iOS platform
        script: |
          # ios/ is committed with a pre-configured Info.plist (GADApplicationIdentifier etc.).
          # DON'T run `cap add ios` — it would regenerate/overwrite the project. Only sync copies
          # the fresh web build + installs pods, leaving our Info.plist untouched.
          npx cap sync ios
      - name: Generate app icon & splash
        script: npx @capacitor/assets generate --ios || true
      - name: Set up App Store (distribution) code signing
        script: |
          # Fail loudly (set -e) so a broken signing step can't go green and blow up later.
          set -e
          keychain initialize
          # PERMANENT signing key: reuse the SAME distribution private key every build. On the first
          # build fetch-signing-files creates ONE cert for this key; every later build finds that
          # existing cert (its key matches) and REUSES it — so we never create a new cert, never hit
          # Apple's distribution-cert cap, and never touch your OTHER apps' certificates.
          #  - Preferred: store the PEM key as a Codemagic secure env var DIST_CERT_KEY.
          #  - Fallback (first bootstrap run): generate a fresh key. Requires being under the cert cap
          #    (delete the orphaned Chrono Empire distribution certs in the Apple portal first).
          CERT_KEY=/tmp/dist_cert_key.pem
          if [ -n "$DIST_CERT_KEY" ]; then
            echo "Using distribution key from DIST_CERT_KEY env var (reusing existing cert)."
            echo "$DIST_CERT_KEY" | base64 --decode > "$CERT_KEY"
          else
            echo "DIST_CERT_KEY not set — generating a new key (bootstrap; needs a free cert slot)."
            openssl genrsa -out "$CERT_KEY" 2048
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:"$CERT_KEY" \
            --create
          keychain add-certificates
          # Show the key's fingerprint so you can confirm the same key is reused across builds.
          echo "dist key sha256: $(openssl rsa -in "$CERT_KEY" -pubout 2>/dev/null | openssl dgst -sha256 | awk '{print $2}')"
          # Now that a usable distribution cert + App Store profile actually exist (they didn't in
          # the earlier attempts — the cert step was failing), let Codemagic wire them into the
          # Xcode project. It reads the profile from wherever fetch-signing-files installed it.
          xcode-project use-profiles
      - name: Archive & export the .ipa
        script: |
          # build-ipa archives + exports the App Store .ipa using the profile installed above.
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true      # goes to TestFlight first (safe)
        # submit_to_app_store: false    # flip to true when you're ready for the public release
